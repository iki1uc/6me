<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NC Start</title>
<style>
  body { background:#000; color:#0f0; font-family:system-ui; padding:20px; }
</style>

<script>
async function UploadCheck(){
  try {
    const res = await fetch("iAM.html");
    return res.status === 200 ? "OK" : "FEHLT";
  } catch(e){
    return "FEHLT";
  }
}

async function NC_Fallback(){
  const status = await UploadCheck();

  if(status === "OK"){
    window.location.href = "iAM.html";
  } else {
    document.body.innerHTML = `
      <h1 style="color:#0f0;">NC Fallback aktiv</h1>
      <p style="color:#0f0;">iAM.html fehlt – index.html übernimmt automatisch.</p>
    `;
  }
}

window.addEventListener("load", NC_Fallback);
</script>
</head>

<body>
<h1>NC Start</h1>
<p>Prüfe iAM.html…</p>
</body>
</html>
